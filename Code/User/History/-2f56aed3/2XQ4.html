<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CulinarIA{% endblock %}</title>
    {% block style %}<link rel="stylesheet"  href="{{ url_for('static', filename='style.css') }}"> {% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="header-container">
        <div class="header-content">
            <h1 class="logo" onclick="window.location.href='{{ url_for('menu.menu') }}'">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="logo-img">
            </h1>

            {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.profile') }}" class="profile-btn">
                    <img src="{{ url_for('static', filename='assets/profile-icon.svg') }}" alt="Perfil" class="profile-icon">
                </a>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="login-btn">Login</a>
            {% endif %}
        </div>
    </header>

    <div class="main-card">
        {% block content %}
        <!-- O conteúdo específico da página vai aqui -->
        {% endblock %}
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            padding: 0px 80px;
            background-color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-container {
            padding: 2rem 20px;
            width: 100%;
            background: #fff;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin: 0;
        }

        .logo-img {
            height: 32px;
            margin-right: 12px;
        }


        .login-btn {
            padding: 8px 24px;
            border: 2px solid #F5AD00;
            border-radius: 20px;
            color: #F5AD00;
            background: none;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #F5AD00;
            color: #fff;
        }

        .profile-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-icon {
            width: 100%;
            height: 100%;
        }

        .main-card {
            width: 100%;
            border-radius: 15px;
            border: 1px solid #d3d3d3;
            min-height: 80vh;
        }

        @media (max-width: 768px) {
            body {
                padding: 0 20px;
            }

            .header-content {
                padding: 0 10px;
            }
        }
    </style>
</body>
{% block script %}<script src="{{ url_for('static', filename='script.js') }}"></script>{% endblock %}
</html>
