<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CulinarIA{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="bg-white p-8 rounded-lg shadow-md w-full h-full flex flex-col justify-center items-center">
        <header class="flex justify-between items-center w-full max-w-4xl mb-6">
            <h1 class="text-2xl font-bold flex items-center ml-[-112px]">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="h-8 mr-3 ">
            </h1>
            <button class="border-2 border-orange-500 text-orange-500 font-semibold text-lg px-6 py-2 rounded-full hover:bg-orange-500 hover:text-white transition ml-10">login</button>
            <img id="userImage" src="{{ url_for('static', filename='assets/profile-icon.svg') }}" alt="Perfil" class="hidden w-10 h-10 rounded-full cursor-pointer" onclick="openUserMenu()">
        </header>
<!DOCTYPE html>

<body>
    
    <div class="main-card">
        {% block content %}
        <!-- O conteúdo específico da página vai aqui -->
        {% endblock %}
    </div>
</body>
{% block script %}<script src="{{ url_for('static', filename='script.js') }}"></script>{% endblock %}
</html>
